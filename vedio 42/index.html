<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS transform</title>
    <style>
        .container {
            width: 300px;
            height: 300px;
            border: 2px solid #ccc;
            margin: 50px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 100px;
            height: 100px;
            background-color: #f00;
            margin: 50px;
             transform: rotate(45deg); 
            /* scale is used to increase and decrease the size of the element */
            /* transform: scale(1.5); */
            /* skew is used to skew the element */
            /* transform: skewY(20deg); */
            /* translate is used to move the element from its original position */
            /* transform: translate(100px, 50px); */
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
    </div>
    
</body>
</html>
