<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css box model</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .box{
            width: 200px;
            height: 200px;
            background-color: red;
            border: 10px solid black;
            padding: 20px;
            margin: 30px;
        }
        .box-1{
            background-color: green;
        }
        .box-2{
            background-color: blue;
        }
    </style>
</head>
<body>
    <!-- one elements can have multiple calsses. -->
    <div class="box box-1"> i am a box</div>
    <div class="box box-2"> i am the second box</div>
    
</body>
</html>
