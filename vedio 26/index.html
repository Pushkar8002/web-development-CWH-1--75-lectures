<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS overflow property</title>
    <style>
        .box {
            width: 80px;
            height: 100px;
            border: 1px solid black;
            /* these overflow properties are used to control the behavior of content that exceeds the dimensions of its container. */
            /* overflow: hidden;  */
                 overflow: scroll;  
                /* overflow: auto;   */
                 /* overflow: visible;  */
                white-space: nowrap;
                /* text overflow is used to control how overflowed content is displayed when it exceeds the width of its container. */ 
                /* text-overflow: ellipsis; */
                overflow-y: auto;
                    /* overflow-x: hidden;  */
                    /* overflow-x: scroll;  */
                    /* overflow-x: auto;  */
                    /* overflow-x: visible;  */


            
        }
    </style>
</head>
<body>
    <div class="box">This is a box with overflow content.
        Lorem, ipsum dolor sit amet consectetur adipisicing elit. Sint, accusamus.
    </div>
    
</body>
</html>
