<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Object-fit and Object-cover</title>
    <style>
        .container {
            width: 300px;
            height: 200px;
            border: 2px solid black;
            background-color: red;
        }

        .container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* or object-fit: fill; */
            object-position: 10px 10px; /* or object-position: 50% 50%; */
        }
    </style>
</head>
<body>
    <div class="container">
     <img src="https://i0.wp.com/picjumbo.com/wp-content/uploads/artistic-high-fashion-portrait-of-a-woman-with-sunglasses-free-image.jpeg?w=600&quality=80" alt="photo">
    </div>
</body>
</html>
