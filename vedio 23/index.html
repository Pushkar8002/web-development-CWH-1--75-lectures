<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS display property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 200px;
            height: 200px;
            background-color: red;
            display: inline-block;
            padding: 45px;
            margin: 34px;
        }
        .box1{
            
            display :flex;
            justify-content: center;
                align-items: center;
                width: 200px;
                height: 200px;
                background-color: blue;
                padding: 45px;
                margin: 34px;
        }
    </style>
</head>
<body>
    <div class = "box">i am a box</div>
    <div class = "box1">also in the </div>
    <span>i am good</span>
    <span>i am a boy</span>
</body>
</html>
