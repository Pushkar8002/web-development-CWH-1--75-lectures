<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex box</title>
    <style>
        .container{
            border: 2px solid red;
           /* flex is used to create a flexible layout structure without using float or positioning. */
            display: flex;
            height: 80vh;
            /* justify-content is used to align items along the main axis */
            justify-content: center;
            /* align-items is used to align items along the cross axis */
            align-items: center;
            /* flex-direction is used to specify the direction of the flex container */
            flex-direction: column;
            /* align-content is used to align lines of items along the cross axis */
            align-content: center;
            /* gap is used to specify the gap between items in a flex container */
            gap:column 10px;
             
            
             
        }
        .items{
            height: 100px;
            width: 100px;
            background-color: violet;
            border: 2px solid black;
            margin: 4px;
           
        }

    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="items">1</div>
            <div class="items">2</div>
            <div class="items">3</div>
            <div class="items">4</div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
            <div class="items"></div>
        </div>
    </main>
    
</body>
</html>
