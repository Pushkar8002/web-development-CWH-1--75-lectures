<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>h1
        h1 {
            color: aqua;
        }
        .yello {
            color: yellow;
        }
        .red {
            color: red;
        }
        /* here in css last order is important so purple will be applied to h1 and it will override the previous color properties */
        .purple {
            color: purple;
        }
    </style>
</head>
<body>
    <div><h1 class="yello red purple"> css specificity</h1></div>
    
</body>
</html>
