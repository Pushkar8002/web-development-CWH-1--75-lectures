<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- this is internal CSS and it is used to style the element in the head section of the html document. -->
    <style>
        p {
            color: blue;
            font-size: 20px;
            background-color: lightgray;
        }
    </style>
    <!-- this is external CSS and it is used to style the element in the external css file and link it to the html document. --> 
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- here style is the inline css and it is used to style the element directly in the html tag. -->
    <h1 style="color: yellow; background-color: rebeccapurple;">Three ways to add CSS</h1>
    <div>
        <ol>
            <li>inline CSS</li>
            <li>internal CSS</li>
            <li>external CSS</li>
        </ol>
    </div>
    <p>My goal is to build responsive and interactive websites.</p>
</body>
</html>
