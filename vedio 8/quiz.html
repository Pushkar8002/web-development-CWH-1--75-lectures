<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- write a html code to create a form which will ask user for his name, city and pin code and also have a text area for comments. -->
</head>
<body>
    <form class="quiz-form">
        <div>
            <label for="name">What is your name?</label>
            <input type="text" name="name" placeholder="enter name" id="name">
        </div>
        <div>
            <label for="city">What is your city?</label>
            <input type="text" name="city" placeholder="enter city" id="city">
        </div>
        <div>
            <label for="pin">What is your pin code?</label>
            <input type="number" name="pin" placeholder="enter pin code" id="pin">
        </div>
        <div>
            <label for="comments">Comments:</label>
            <textarea name="comments" id="comments" 
            placeholder="Enter your comments here (max 30 characters)" rows="10"></textarea>
        </div>
    </form>
</body>
</html>
