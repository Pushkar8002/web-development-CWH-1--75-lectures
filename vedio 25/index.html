<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css Styling lists</title>
    <style>
        nav ul li {
            /* list style is used change the defalut list style to anythingh. */
            list-style: devanagari;
            list-style-type: square; 
            /* the last cahnge in list style will be applied to the list. */
            list-style-type:"*";
            /* here we can add the image url to change the default list style to the image we want. */
            list-style-image: url(".......");
            color: red;
            border: yellow 2px solid;
            background-color: brown;
        }
    </style>
</head>
<body>
    <nav><ul>
        <li>home</li>
    <li>about</li>
<li>contact</li>
<li>contact</li>
</ul></nav>
</body>
</html>
