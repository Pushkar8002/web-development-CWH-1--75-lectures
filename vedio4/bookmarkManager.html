<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager = by Pushkar </title>
</head>
<body>
    <h1>My bookmarks</h1>
    <h2>Primary bookmarks</h2>
    <!-- anchor tag to link to another website in same tab-->
  <!-- <p> is used to show the links in diagonal form -->
     <p> <a href="https://www.google.com/">open Google</a></p>
    <!-- if we want to open the link on new tab so we clik on youtube -->
    <!-- target is used to open link in new tab -->
    <p><a target="_blank" href="https://www.youtube.com/">open YouTube</a></p>
    
    <h2>Secondary bookmarks</h2>
   <p> <a href="https://www.codewithharry.com/">open Code with Harry</a></p>
   <p> <a target="_blank" href="https://www.jiosaavn.com/">open JioSaavn</a></p>
   <p> <a href="https://www.instagram.com/">open Instagram</a></p>
        
</body>
</html>
