<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and classes in HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- class and id are used to identify elements in HTML. The main difference between them is that an id is unique and can only be used once in a document, while a class can be used -->
    <div id = "first-div" class = "red">This is a first div</div>
    <div id = "second-div" class = "red">This is a second div</div>
    <span class = "red"> span</span>
    
</body>
</html>
