<!DOCTYPE html>
<html>
<head>
<style>
    /* in import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap'); */

@import url('https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Poppins:ital,wght@  4  5  6  7  8  9   &display=swap');


  h1 {
    color: #0476e7;
    text-align: center;
    text-transform: uppercase;
    /* after importing we need to use the font-family in the element to apply the font style */
    font-family: 'Baloo Bhai 2', 'Poppins', cursive;
    
  }

  p {
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-weight: bold;
    color: rgb(52, 152, 219);
    line-height: 1.6;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>Welcome</h1>
<p>This is CSS Fonts, Text and Color Example.</p>

</body>
</html>
